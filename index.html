<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuickBooks Financial Dashboard</title>
<style>
  :root {
    --bg:#eef1f4; --card:#ffffff; --line:#e3e7ec; --ink:#2f3640; --muted:#8a94a0;
    --teal:#0e7d6d; --green:#37b06a; --red:#e8564f;
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--ink);
         font:14px/1.45 "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .wrap { width:100%; max-width:1220px; }

  /* ---- Upload screen ---- */
  #uploader { max-width:560px; margin:0 auto; text-align:center; }
  #uploader h1 { font-size:20px; color:var(--teal); margin-bottom:6px; }
  #uploader p.lede { color:var(--muted); margin-bottom:22px; }
  #dropzone { background:var(--card); border:2px dashed #b9c2cc; border-radius:10px;
              padding:44px 24px; cursor:pointer; transition:border-color .15s, background .15s; }
  #dropzone.hover { border-color:var(--teal); background:#f2faf8; }
  #dropzone .icon { font-size:34px; margin-bottom:10px; }
  #dropzone strong { color:var(--teal); }
  #filelist { margin-top:16px; text-align:left; }
  .filetag { display:flex; justify-content:space-between; background:var(--card);
             border:1px solid var(--line); border-radius:6px; padding:9px 14px; margin-top:8px; font-size:13px; }
  .filetag .role { color:var(--muted); }
  .filetag .role.ok { color:var(--green); font-weight:600; }
  #status { margin-top:14px; font-size:13px; color:var(--muted); min-height:20px; }
  #status.err { color:var(--red); font-weight:600; }
  .privacy { margin-top:20px; font-size:12px; color:var(--muted); }

  /* ---- Dashboard ---- */
  #dashboard { display:none; }
  .toolbar { display:flex; justify-content:flex-end; gap:10px; margin-bottom:12px; }
  .toolbar button { background:var(--card); border:1px solid var(--line); border-radius:6px;
                    padding:7px 14px; font:inherit; font-size:12.5px; color:var(--ink); cursor:pointer; }
  .toolbar button:hover { border-color:var(--teal); color:var(--teal); }
  .grid { display:grid; grid-template-columns:repeat(6, 1fr); gap:16px; align-items:stretch; }
  .card { grid-column:span 2; background:var(--card); border:1px solid var(--line); border-radius:8px;
          padding:20px 22px; display:flex; flex-direction:column; }
  .card.wide { grid-column:span 3; }
  @media (max-width: 900px) {
    .grid { grid-template-columns:1fr; }
    .card, .card.wide { grid-column:auto; }
    .wrap { max-width:460px; }
  }
  .card h2 { font-size:13px; font-weight:600; margin-bottom:2px; }
  .card .period { font-size:11px; color:var(--muted); margin-bottom:14px; }
  .body { flex:1; display:flex; flex-direction:column; justify-content:center; gap:20px; }
  .duo { display:flex; gap:14px; }
  .duo .mini { flex:1; min-width:0; border:1px solid var(--line); border-radius:6px;
               padding:12px 10px; text-align:center; }
  .mini .v { font-size:17px; font-weight:700; white-space:nowrap; }
  .mini .k { font-size:11px; color:var(--muted); margin-top:3px; }
  .pos { color:var(--green); } .neg { color:var(--red); }
  .gauges { flex:1; display:flex; gap:14px; text-align:center; align-items:center; justify-content:center; }
  .gauges > div { flex:1; min-width:0; }
  .gauge { width:100%; max-width:200px; margin:0 auto; }
  .gauge-pct { font-size:15px; font-weight:700; fill:var(--ink); }
  .gauge-label { color:var(--muted); font-size:12px; margin-top:6px; }
  .gauge-value { font-size:19px; font-weight:700; white-space:nowrap; }
  .hbar { width:100%; }
  .hb-name { font-size:11px; fill:var(--ink); }
  .hb-val { font-size:11px; fill:var(--muted); }
  table.stats { width:100%; border-collapse:collapse; }
  .stats td { padding:8px 0; border-top:1px solid var(--line); font-size:13px; }
  .stats td:last-child { text-align:right; font-weight:600; white-space:nowrap; }
  .stats tr.sec td { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase;
                     letter-spacing:.5px; padding-top:12px; padding-bottom:2px; border-top:none; }
  .stats tr.tot td { font-weight:700; }
  .empty { color:var(--muted); font-size:12px; }
  @media print {
    body { background:#fff; padding:0; }
    .toolbar, #uploader { display:none !important; }
    .card { break-inside:avoid; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div id="uploader">
    <h1>QuickBooks Financial Dashboard</h1>
    <p class="lede">Drop in the Balance Sheet and Profit &amp; Loss CSVs exported from QuickBooks Online.</p>
    <div id="dropzone" tabindex="0" role="button" aria-label="Choose or drop CSV files">
      <div class="icon">&#128203;</div>
      <div>Drag both CSV files here, or <strong>click to browse</strong></div>
    </div>
    <input type="file" id="fileinput" accept=".csv,text/csv" multiple hidden>
    <div id="filelist"></div>
    <div id="status"></div>
    <p class="privacy">Files are processed entirely in your browser. Nothing is uploaded or stored anywhere.</p>
  </div>

  <div id="dashboard">
    <div class="toolbar">
      <button id="btn-print" type="button">Print / save as PDF</button>
      <button id="btn-reset" type="button">Load different files</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>

</div>

<script>
"use strict";

/* ================= CSV parsing (quoted fields, CRLF) ================= */

function parseCsv(text) {
  const rows = []; let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false;
      } else field += c;
    } else if (c === '"') inQ = true;
    else if (c === ",") { row.push(field); field = ""; }
    else if (c === "\n" || c === "\r") {
      if (c === "\r" && text[i + 1] === "\n") i++;
      row.push(field); rows.push(row); row = []; field = "";
    } else field += c;
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function toNumber(raw) {
  if (raw == null) return null;
  let s = String(raw).trim().replace(/\$/g, "").replace(/,/g, "");
  if (s === "" || s === "-") return null;
  const neg = s.startsWith("-") || (s.startsWith("(") && s.endsWith(")"));
  s = s.replace(/[()\-]/g, "");
  const v = parseFloat(s);
  if (isNaN(v)) return null;
  return neg ? -v : v;
}

/* ================= QuickBooks report parsing ================= */

function parseQbReport(text) {
  const raw = parseCsv(text.replace(/^\uFEFF/, ""));
  const rows = [], header = [];
  const meta = { company: "", report: "", period: "" };
  for (const r of raw) {
    const label = (r[0] || "").trim();
    const value = r.length > 1 ? toNumber(r[1]) : null;
    if (!label && value == null) continue;
    const low = label.toLowerCase();
    if (low.includes("accrual basis") || low.includes("cash basis")) continue;
    if (!rows.length && value == null && header.length < 3 &&
        low !== "total" && !low.startsWith("total for")) { header.push(label); continue; }
    if (low === "" || low === "total") continue;
    rows.push([label, value]);
  }
  meta.company = header[0] || "";
  meta.report  = header[1] || "";
  meta.period  = header[2] || "";
  const totals = {};
  for (const [label, value] of rows) {
    const m = label.match(/^total for (.+)$/i);
    if (m && value != null) totals[m[1].trim()] = value;
  }
  return { meta, rows, totals };
}

function sectionRows(rows, startLabel, endLabel) {
  const out = []; let active = false;
  for (const [label, value] of rows) {
    const low = label.toLowerCase();
    if (low === startLabel.toLowerCase()) { active = true; continue; }
    if (active && low === endLabel.toLowerCase()) break;
    if (active) out.push([label, value]);
  }
  return out;
}

function topLevelCategories(rows) {
  const groupNames = new Set();
  for (const [label] of rows) {
    const m = label.match(/^total for (.+)$/i);
    if (m) groupNames.add(m[1].trim().toLowerCase());
  }
  const stack = [], result = [];
  for (const [label, value] of rows) {
    const m = label.match(/^total for (.+)$/i);
    if (m) {
      const name = m[1].trim();
      if (stack.length && stack[stack.length - 1].toLowerCase() === name.toLowerCase()) {
        stack.pop();
        if (!stack.length && value != null) result.push([name, value]);
      }
      continue;
    }
    if (groupNames.has(label.trim().toLowerCase())) { stack.push(label.trim()); continue; }
    if (!stack.length && value != null) result.push([label, value]);
  }
  return result;
}

function findRow(rows, ...needles) {
  for (const [label, value] of rows) {
    const low = label.toLowerCase();
    if (needles.every(n => low.includes(n.toLowerCase())) && value != null) return value;
  }
  return null;
}

/* ================= Report detection + metrics ================= */

function detectReports(parsedFiles) {
  let bs = null, pl = null;
  for (const p of parsedFiles) {
    const report = p.meta.report.toLowerCase();
    const labels = new Set(p.rows.map(r => r[0]));
    if (report.includes("balance sheet") || labels.has("Liabilities and Equity")) bs = p;
    else if (report.includes("profit and loss") || labels.has("Gross Profit")) pl = p;
  }
  return { bs, pl };
}

function extractMetrics(bs, pl) {
  const m = {};
  m.company  = pl.meta.company || bs.meta.company;
  m.plPeriod = pl.meta.period;
  m.bsPeriod = bs.meta.period;

  m.ar = bs.totals["Accounts Receivable"] ?? findRow(bs.rows, "accounts receivable (a/r)");
  m.ap = bs.totals["Accounts Payable"]    ?? findRow(bs.rows, "accounts payable (a/p)");
  m.cash = bs.totals["Bank Accounts"] ?? null;

  m.revenue  = pl.totals["Income"] ?? null;
  m.cogs     = pl.totals["Cost of Goods Sold"] ?? 0;
  m.expenses = pl.totals["Expenses"] ?? null;
  m.grossProfit = findRow(pl.rows, "gross profit");
  m.netIncome = null;
  for (const [label, value] of pl.rows)
    if (label.trim().toLowerCase() === "net income" && value != null) m.netIncome = value;

  if (m.grossProfit == null && m.revenue != null) m.grossProfit = m.revenue - m.cogs;
  m.grossMargin = m.revenue ? (m.grossProfit / m.revenue * 100) : null;
  m.netMargin   = m.revenue && m.netIncome != null ? (m.netIncome / m.revenue * 100) : null;

  m.bankAccounts = topLevelCategories(sectionRows(bs.rows, "Bank Accounts", "Total for Bank Accounts"));
  m.creditCards  = topLevelCategories(sectionRows(bs.rows, "Credit Cards", "Total for Credit Cards"));
  m.creditTotal  = bs.totals["Credit Cards"] ?? m.creditCards.reduce((s, [, v]) => s + v, 0);
  const longterm = topLevelCategories(sectionRows(bs.rows, "Long-term Liabilities", "Total for Long-term Liabilities"));
  const otherCl  = topLevelCategories(sectionRows(bs.rows, "Other Current Liabilities", "Total for Other Current Liabilities"));
  m.loans = otherCl.filter(([k]) => k.toLowerCase().includes("loan")).concat(longterm);
  m.loanTotal = m.loans.reduce((s, [, v]) => s + v, 0);
  m.debtTotal = m.loanTotal + (m.creditTotal || 0);
  return m;
}

/* ================= Formatting + SVG builders ================= */

function fmtMoney(v, decimals = 2) {
  if (v == null) return "\u2014";
  const sign = v < 0 ? "-" : "";
  return sign + "$" + Math.abs(v).toLocaleString("en-US",
    { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtMoneyShort(v) {
  if (v == null) return "\u2014";
  const sign = v < 0 ? "-" : "", a = Math.abs(v);
  if (a >= 1e6) return sign + "$" + (a / 1e6).toFixed(2) + "M";
  if (a >= 1e4) return sign + "$" + (a / 1e3).toFixed(1) + "K";
  return sign + "$" + Math.round(a).toLocaleString("en-US");
}

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function hbarSvg(items, opts = {}) {
  if (!items.length) return "<p class='empty'>No data</p>";
  const { color = "#59a14f", width = 380, rowH = 34, colors = null, labelW = 150 } = opts;
  const vmax = Math.max(...items.map(([, v]) => v)) || 1;
  const h = rowH * items.length + 6, valW = 84;
  const barMax = width - labelW - valW - 16;
  let parts = "";
  items.forEach(([label, value], i) => {
    const y = i * rowH + 6;
    const bw = Math.max(2, Math.min(value / vmax, 1) * barMax);
    const c = colors ? colors[i] : color;
    const short = label.length <= 24 ? label : label.slice(0, 23) + "\u2026";
    parts +=
      `<text x="${labelW - 8}" y="${y + rowH / 2}" class="hb-name" text-anchor="end" dominant-baseline="middle">${esc(short)}</text>` +
      `<rect x="${labelW}" y="${(y + rowH * 0.18).toFixed(1)}" width="${bw.toFixed(1)}" height="${(rowH * 0.5).toFixed(1)}" rx="3" fill="${c}"/>` +
      `<text x="${(labelW + bw + 8).toFixed(1)}" y="${y + rowH / 2}" class="hb-val" dominant-baseline="middle">${fmtMoneyShort(value)}</text>`;
  });
  return `<svg viewBox="0 0 ${width} ${h}" class="hbar">${parts}</svg>`;
}

function gaugeSvg(pct, bigLabel, bigValue, width = 230) {
  const shown = pct == null ? "\u2014" : pct.toFixed(2) + "%";
  const p = pct == null ? 0 : Math.max(0, Math.min(100, pct));
  const cx = width / 2, cy = width * 0.44, r = width * 0.34, stroke = width * 0.115;
  const pt = (frac, radius) => {
    const a = Math.PI + Math.PI * frac;
    return [cx + radius * Math.cos(a), cy + radius * Math.sin(a)];
  };
  const arc = (f1, f2, color) => {
    const [x1, y1] = pt(f1, r), [x2, y2] = pt(f2, r);
    return `<path d="M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r.toFixed(2)} ${r.toFixed(2)} 0 0 1 ${x2.toFixed(2)} ${y2.toFixed(2)}" fill="none" stroke="${color}" stroke-width="${stroke}"/>`;
  };
  const [nx, ny] = pt(p / 100, r - stroke * 0.15);
  const h = cy + stroke * 0.9;
  return `
<svg viewBox="0 0 ${width} ${h.toFixed(0)}" class="gauge">
  ${arc(0, 0.34, "#e8564f")}${arc(0.34, 0.67, "#f4c542")}${arc(0.67, 1, "#37b06a")}
  <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(2)}" y2="${ny.toFixed(2)}" stroke="#3a3f45" stroke-width="3" stroke-linecap="round"/>
  <circle cx="${cx}" cy="${cy}" r="6" fill="#3a3f45"/>
  <text x="${cx}" y="${(cy + stroke * 0.72).toFixed(1)}" class="gauge-pct" text-anchor="middle">${shown}</text>
</svg>
<div class="gauge-label">${esc(bigLabel)}</div>
<div class="gauge-value">${bigValue}</div>`;
}

/* ================= Dashboard rendering ================= */

function renderDashboard(m) {
  const totalCosts = (m.cogs || 0) + (m.expenses || 0);
  const arapBars = hbarSvg(
    [["Accounts Receivable", m.ar || 0], ["Accounts Payable", m.ap || 0]],
    { color: "#2a9d8f", rowH: 44 });
  const revExpBars = hbarSvg(
    [["Revenue", m.revenue || 0], ["Expenses", totalCosts]],
    { rowH: 44, colors: ["#37b06a", "#e8564f"] });
  const cashBars = m.bankAccounts.length
    ? hbarSvg(m.bankAccounts, { color: "#2a9d8f", rowH: 40 })
    : "<p class='empty'>No bank accounts found</p>";
  const debtRows = items => items.length
    ? items.map(([k, v]) => `<tr><td>${esc(k)}</td><td>${fmtMoney(v)}</td></tr>`).join("")
    : '<tr><td colspan="2" class="empty">None on file</td></tr>';
  const niClass = (m.netIncome || 0) >= 0 ? "pos" : "neg";

  document.getElementById("grid").innerHTML = `
    <div class="card">
      <h2>Receivables &amp; Payables</h2>
      <div class="period">${esc(m.bsPeriod || "")}</div>
      <div class="body">
        <div class="duo">
          <div class="mini"><div class="v">${fmtMoney(m.ar)}</div><div class="k">Accounts Receivable</div></div>
          <div class="mini"><div class="v">${fmtMoney(m.ap)}</div><div class="k">Accounts Payable</div></div>
        </div>
        <div>${arapBars}</div>
      </div>
    </div>

    <div class="card">
      <h2>Revenue &amp; Expenses</h2>
      <div class="period">${esc(m.plPeriod || "")}</div>
      <div class="body">
        <div class="duo">
          <div class="mini"><div class="v pos">${fmtMoney(m.revenue)}</div><div class="k">Revenue</div></div>
          <div class="mini"><div class="v neg">${fmtMoney(totalCosts)}</div><div class="k">Expenses (incl. COGS)</div></div>
        </div>
        <div>${revExpBars}</div>
        <table class="stats">
          <tr><td>Gross profit</td><td>${fmtMoney(m.grossProfit)}</td></tr>
          <tr><td>Net income</td><td class="${niClass}">${fmtMoney(m.netIncome)}</td></tr>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Profit Margins</h2>
      <div class="period">${esc(m.plPeriod || "")}</div>
      <div class="gauges">
        <div>${gaugeSvg(m.grossMargin, "Gross Profit", fmtMoney(m.grossProfit))}</div>
        <div>${gaugeSvg(m.netMargin, "Net Profit", fmtMoney(m.netIncome))}</div>
      </div>
    </div>

    <div class="card wide">
      <h2>Cash Balances</h2>
      <div class="period">${esc(m.bsPeriod || "")}</div>
      <div class="body">
        <div class="duo">
          <div class="mini"><div class="v pos">${fmtMoney(m.cash)}</div><div class="k">Total Cash in Bank</div></div>
        </div>
        <div>${cashBars}</div>
      </div>
    </div>

    <div class="card wide">
      <h2>Debt Summary</h2>
      <div class="period">${esc(m.bsPeriod || "")}</div>
      <div class="body">
        <table class="stats">
          <tr class="sec"><td colspan="2">Loans</td></tr>
          ${debtRows(m.loans)}
          <tr class="sec"><td colspan="2">Credit</td></tr>
          ${debtRows(m.creditCards)}
          <tr class="tot"><td>Total debt</td><td class="neg">${fmtMoney(m.debtTotal)}</td></tr>
        </table>
      </div>
    </div>`;

  document.getElementById("uploader").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  document.title = (m.company ? m.company + " \u2014 " : "") + "Financial Dashboard";
}

/* ================= File handling UI ================= */

const pending = { bs: null, pl: null };
const dropzone = document.getElementById("dropzone");
const fileinput = document.getElementById("fileinput");
const statusEl = document.getElementById("status");
const filelist = document.getElementById("filelist");

function setStatus(msg, isErr) {
  statusEl.textContent = msg;
  statusEl.className = isErr ? "err" : "";
}

function showFileTag(name, role) {
  const div = document.createElement("div");
  div.className = "filetag";
  div.innerHTML = `<span>${esc(name)}</span><span class="role ok">${esc(role)}</span>`;
  filelist.appendChild(div);
}

function handleFiles(fileArray) {
  const files = Array.from(fileArray).filter(f => /\.csv$/i.test(f.name));
  if (!files.length) { setStatus("Those don't look like CSV files \u2014 export as CSV from QuickBooks.", true); return; }
  let done = 0;
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = parseQbReport(reader.result);
        const { bs, pl } = detectReports([parsed]);
        if (bs) { pending.bs = parsed; showFileTag(f.name, "Balance Sheet \u2713"); }
        else if (pl) { pending.pl = parsed; showFileTag(f.name, "Profit & Loss \u2713"); }
        else showFileTag(f.name, "Not recognized");
      } catch (e) {
        showFileTag(f.name, "Could not parse");
      }
      if (++done === files.length) maybeRender();
    };
    reader.readAsText(f);
  });
}

function maybeRender() {
  if (pending.bs && pending.pl) {
    try {
      renderDashboard(extractMetrics(pending.bs, pending.pl));
    } catch (e) {
      setStatus("Something went wrong reading those reports \u2014 check they're standard QuickBooks Online exports.", true);
    }
  } else if (pending.bs) setStatus("Balance Sheet loaded \u2014 now add the Profit & Loss CSV.");
  else if (pending.pl) setStatus("Profit & Loss loaded \u2014 now add the Balance Sheet CSV.");
  else setStatus("Neither file was recognized as a QuickBooks Balance Sheet or Profit & Loss export.", true);
}

dropzone.addEventListener("click", () => fileinput.click());
dropzone.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") fileinput.click(); });
fileinput.addEventListener("change", () => handleFiles(fileinput.files));
["dragenter", "dragover"].forEach(ev =>
  dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add("hover"); }));
["dragleave", "drop"].forEach(ev =>
  dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove("hover"); }));
dropzone.addEventListener("drop", e => handleFiles(e.dataTransfer.files));

document.getElementById("btn-print").addEventListener("click", () => window.print());
document.getElementById("btn-reset").addEventListener("click", () => {
  pending.bs = pending.pl = null;
  filelist.innerHTML = ""; fileinput.value = "";
  setStatus("");
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("uploader").style.display = "block";
  document.title = "QuickBooks Financial Dashboard";
});
</script>
</body>
</html>
